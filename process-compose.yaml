environment:
  - .env
  - .env.dev

processes:
  dev-services:
    command: just run-dev-services
    is_daemon: false
    readiness_probe:
      exec:
        command: just get-dev-services-healthy
      initial_delay_seconds: 3
      period_seconds: 3
      timeout_seconds: 2
      success_threshold: 1
      failure_threshold: 3
    availability:
      restart: "always"

  backend:
    command: just backend dev
    availability:
      restart: always
    depends_on:
      dev-services:
          condition: process_healthy

  frontend:
    command: just run-frontend dev
    availability:
      restart: on_failure
      max_restarts: 1
    depends_on:
      backend:
        condition: process_started

  documents-server:
    disabled: true
    command: just run-documents-server dev
    availability:
      restart: on_failure
      max_restarts: 1
