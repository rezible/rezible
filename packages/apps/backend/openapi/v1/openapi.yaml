    get:
      operationId: list-alerts
      parameters:
        - explode: false
          in: query
          name: limit
          schema:
            default: 10
            format: int64
            maximum: 50
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int64
            minimum: 0
            type: integer
        - explode: false
          in: query
          name: search
          schema:
            type: string
        - explode: false
          in: query
          name: archived
          schema:
            default: false
            type: boolean
        - explode: false
          in: query
          name: rosterId
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlertsResponseBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
