paths:
  /agent-runs:
    get:
      operationId: list-agent-runs
      parameters:
        - explode: false
          in: query
          name: limit
          schema:
            default: 10
            format: int64
            maximum: 50
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int64
            minimum: 0
            type: integer
        - explode: false
          in: query
          name: search
          schema:
            type: string
        - explode: false
          in: query
          name: archived
          schema:
            default: false
            type: boolean
        - explode: false
          in: query
          name: workflowKind
          schema:
            type: string
        - explode: false
          in: query
          name: status
          schema:
            type: string
        - explode: false
          in: query
          name: subjectKind
          schema:
            type: string
        - explode: false
          in: query
          name: subjectId
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentRunsResponseBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: List Agent Runs
      tags:
        - Agent Runs
  /agent-runs/{id}:
    get:
      operationId: get-agent-run
