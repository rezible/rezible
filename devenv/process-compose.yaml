environment: [".env", ".env.workspace"]

processes:
  postgres:
    command: just dev run-service postgres
    is_daemon: true
    readiness_probe:
      exec:
        command: docker compose exec -it postgres pg_isready
      period_seconds: 3

  dex:
    command: just dev run-service dex
    is_daemon: true
    availability:
      restart: on_failure
      max_restarts: 1
    readiness_probe:
      exec:
        command: wget -q --spider "http://localhost:${AUTH_PORT}/.well-known/openid-configuration"
      period_seconds: 3

  telemetry:
    command: just dev run-service telemetry
    is_daemon: true
    disabled: false
    availability:
      restart: on_failure
      max_restarts: 1
    readiness_probe:
      exec:
        command: wget -q --spider "http://localhost:${GRAFANA_PORT}/api/health"
      period_seconds: 5

  backend:
    command: just backend dev
    availability:
      restart: always
    depends_on:
      postgres:
        condition: process_healthy
      telemetry:
        condition: process_healthy

  frontend:
    command: just frontend dev
    availability:
      restart: always

  documents-server:
    disabled: false
    command: just documents-server dev
    availability:
      restart: on_failure
      max_restarts: 1
