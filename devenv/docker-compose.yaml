name: "rezible"

volumes:
  postgres-data:

secrets:
  slack_webhook_url:
    environment: SLACK_WEBHOOK_URL

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports: ["${POSTGRES_PORT}:5432"]
    environment:
      - PGUSER=${POSTGRES_ADMIN_USER}
      - POSTGRES_USER=${POSTGRES_ADMIN_USER}
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 1s
      retries: 3
      start_period: 1s
    volumes:
      - "postgres-data:/var/lib/postgresql/data"

  dex:
    scale: 1
    image: dexidp/dex:v2.41.1
    restart: on-failure:2
    ports: ["${AUTH_PORT}:7011"]
    volumes:
      - "./dex-config.yaml:/etc/dex/config.yaml:ro"
      - "./localias-ca.crt:/etc/ssl/localias.crt:ro"
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    environment:
      - ISSUER=${AUTH_URL}
      - APP_URL=${APP_URL}
      - API_URL=${API_URL}

  telemetry:
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "${GRAFANA_PORT:-7012}:3000"     # Grafana UI
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OpenTelemetry gRPC collector
      - "${OTEL_HTTP_PORT:-4318}:4318"   # OpenTelemetry HTTP collector
    environment:
      ENABLE_LOGS_ALL: "false"

  alertmanager:
    profiles: ["alertmanager"]
    image: quay.io/prometheus/alertmanager:v0.33.0
    restart: on-failure:2
    ports: ["${ALERTMANAGER_PORT:-7013}:9093"]
    volumes:
      - "./alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro"
    secrets:
      - source: slack_webhook_url
        target: slack-webhook-url
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yaml"
      - "--storage.path=/alertmanager"
      - "--cluster.listen-address="
