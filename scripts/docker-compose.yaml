name: "rezible-dev"

volumes:
  postgres-data:

services:
  proxy:
    image: caddy:2
    container_name: proxy
    restart: unless-stopped
    ports: ["5482:80", "5483:2019"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile:ro"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:17
    container_name: rezible-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres"]
      interval: 3s
      timeout: 3s
      retries: 3
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports: ["7010:5432"]

  dex:
    image: dexidp/dex:v2.41.1
    container_name: dex
    restart: unless-stopped
    ports:
      - "5556:5556"   # OIDC / HTTP
      - "5557:5557"   # gRPC (optional, for admin API)
    volumes:
      - ./dev/dex/config.yaml:/etc/dex/config.yaml:ro
      - dex_data:/var/dex              # sqlite storage in dev
    environment:
      DEX_FRONTEND_ISSUER: http://localhost:5556/dex
    command: [ "dex", "serve", "/etc/dex/config.yaml" ]
    networks:
      - app
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider",
              "http://localhost:5556/dex/.well-known/openid-configuration" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dev-oidc:
    image: ghcr.io/businesssimulations/dev-oidc-toolkit:0.6.0
    restart: unless-stopped
    environment:
      DevOidcToolkit__Port: "6432"
      DevOidcToolkit__Issuer: "https://dev-oidc.${LOCAL_DEV_HOST}/"
      DevOidcToolkit__Clients__0__Id: "client"
      DevOidcToolkit__Clients__0__Secret: "secret"
      DevOidcToolkit__Clients__0__RedirectUris__0: "https://app.${LOCAL_DEV_HOST}/auth/callback"
      DevOidcToolkit__Users__0__Email: "${REZ_DEBUG_DEFAULT_USER_EMAIL}"
      DevOidcToolkit__Users__0__FirstName: "Firstname"
      DevOidcToolkit__Users__0__LastName: "Lastname"
      DevOidcToolkit__Users__1__Email: "user@example.com"
      DevOidcToolkit__Users__1__FirstName: "Test"
      DevOidcToolkit__Users__1__LastName: "User"
    networks:
      default:
        aliases: ["dev-oidc.${LOCAL_DEV_HOST}"]
    ports: ["7011:6432"]

  telemetry:
    scale: 0
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OpenTelemetry gRPC collector
      - "4318:4318"   # OpenTelemetry HTTP collector
      - "4100:4100"   # Loki ingest
      - "9090:9090"   # Prometheus UI
    environment:
      ENABLE_LOGS_ALL: "false"
    healthcheck:
      test: /opt/health-check.sh
      interval: 1m
      timeout: 10s
      retries: 10
      start_period: 1m
      start_interval: 10s