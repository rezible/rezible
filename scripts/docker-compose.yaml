name: "rezible-dev"

volumes:
  postgres-data:
  terraform-data:

services:
  proxy:
    image: caddy:2
    container_name: proxy
    restart: unless-stopped
    ports: ["5482:80"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile:ro"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:17
    container_name: rezible-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres"]
      interval: 3s
      timeout: 3s
      retries: 3
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  dev-oidc:
    image: ghcr.io/businesssimulations/dev-oidc-toolkit:0.6.0
    container_name: dev-oidc
    restart: unless-stopped
    environment:
      DevOidcToolkit__Port: "8080"
      DevOidcToolkit__Issuer: "https://oidc.dev.rezible.com/"
      DevOidcToolkit__Users__0__Email: "${REZ_DEBUG_DEFAULT_USER_EMAIL}"
      DevOidcToolkit__Users__0__FirstName: "Firstname"
      DevOidcToolkit__Users__0__LastName: "Lastname"
      DevOidcToolkit__Users__1__Email: "user@example.com"
      DevOidcToolkit__Users__1__FirstName: "Test"
      DevOidcToolkit__Users__1__LastName: "User"
      DevOidcToolkit__Clients__0__Id: "client"
      DevOidcToolkit__Clients__0__Secret: "secret"
      DevOidcToolkit__Clients__0__RedirectUris__0: "https://app.${LOCAL_DEV_HOST}/api/auth/flow/oidc/test-provider/callback"
    networks:
      default:
        aliases:
          - "oidc.${LOCAL_DEV_HOST}"

  tf-provision:
    scale: 0
    image: hashicorp/terraform:1.14
    restart: "no"
    volumes:
      - terraform-data:/terraform-data:rw
      - ./provision.tf:/provision/main.tf:ro
    working_dir: /provision
    environment:
      TF_IN_AUTOMATION: true
      TF_VAR_local_dev_host: "${LOCAL_DEV_HOST}"
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "terraform init -upgrade -input=false > /dev/null \
          && terraform apply -auto-approve -input=false \
          && terraform output -json > /terraform-data/output.json"

  telemetry:
    scale: 0
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OpenTelemetry gRPC collector
      - "4318:4318"   # OpenTelemetry HTTP collector
      - "4100:4100"   # Loki ingest
      - "9090:9090"   # Prometheus UI
    environment:
      ENABLE_LOGS_ALL: "false"
    healthcheck:
      test: /opt/health-check.sh
      interval: 1m
      timeout: 10s
      retries: 10
      start_period: 1m
      start_interval: 10s