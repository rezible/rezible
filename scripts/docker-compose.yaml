name: "rezible-dev"

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports: ["7010:5432"]
    environment:
      - POSTGRES_USER=${POSTGRES_ADMIN_USER}
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
      - POSTGRES_DB=${POSTGRES_ADMIN_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres"]
      interval: 5s
      timeout: 2s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  dex:
    image: dexidp/dex:v2.41.1
    restart: unless-stopped
    ports: ["7011:7011"]
    volumes:
      - "./configs/dex/config.yaml:/etc/dex/config.yaml:ro"
      - "./certs/localias-ca.crt:/etc/ssl/localias.crt:ro"
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    environment:
      - APP_URL=${APP_URL}
      - ISSUER_URL=${AUTH__OIDC__ISSUER_URL}
      - POSTGRES_PASSWORD=${POSTGRES_DEX_PASSWORD}
      - POSTGRES_PORT=5432
      - OIDC_CLIENT_ID=${AUTH__OIDC__CLIENT_ID}
      - OIDC_CLIENT_REDIRECT_URI=${AUTH__OIDC__CLIENT_REDIRECT_URI}
      - GOOGLE_OIDC_CLIENT_ID=${GOOGLE_OIDC_CLIENT_ID}
      - GOOGLE_OIDC_CLIENT_SECRET=${GOOGLE_OIDC_CLIENT_SECRET}
      - GOOGLE_OIDC_CLIENT_REDIRECT_URI=${AUTH__OIDC__ISSUER_URL}/callback
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-t 1", "--spider", "http://localhost:7011/.well-known/openid-configuration"]
      interval: 3s
      timeout: 1s
      retries: 1
      start_period: 1s

  telemetry:
    scale: 0
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OpenTelemetry gRPC collector
      - "4318:4318"   # OpenTelemetry HTTP collector
      - "4100:4100"   # Loki ingest
      - "9090:9090"   # Prometheus UI
    environment:
      ENABLE_LOGS_ALL: "false"
    healthcheck:
      test: /opt/health-check.sh
      interval: 1m
      timeout: 10s
      retries: 10
      start_period: 1m
      start_interval: 10s