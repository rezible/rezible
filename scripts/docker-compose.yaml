name: "rezible-dev"

volumes:
  postgres-data:

services:
  app-proxy:
    image: caddy:2
    restart: unless-stopped
    ports: ["7000:80", "5483:2019"]
    volumes: ["./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro"]
    extra_hosts: ["host.docker.internal:host-gateway"]

  postgres:
    image: postgres:17
    restart: unless-stopped
    ports: ["${POSTGRES_PORT}:5432"]
    environment:
      - POSTGRES_USER=${POSTGRES_ADMIN_USER}
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres"]
      interval: 1s
      timeout: 1s
      retries: 3
      start_period: 2s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  dex:
    image: dexidp/dex:v2.41.1
    restart: unless-stopped
    ports: ["${DEX_PORT}:${DEX_PORT}"]
    volumes:
      - "./configs/dex/config.yaml:/etc/dex/config.yaml:ro"
      - "./certs/localias-ca.crt:/etc/ssl/localias.crt:ro"
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    environment:
      - ISSUER_URL=${DEX_URL}
      - PORT=${DEX_PORT}
      - APP_URL=${APP_URL}
      - API_URL=${API_URL}
      - POSTGRES_PASSWORD=${POSTGRES_DEX_PASSWORD}
      - APP_CLIENT_ID=${AUTH__OIDC__CLIENT_ID}
      - APP_CLIENT_REDIRECT_URI=${APP_OIDC_CLIENT_REDIRECT_URI}
      - GOOGLE_OIDC_CLIENT_ID=${GOOGLE_OIDC_CLIENT_ID}
      - GOOGLE_OIDC_CLIENT_SECRET=${GOOGLE_OIDC_CLIENT_SECRET}
      - GOOGLE_OIDC_CLIENT_REDIRECT_URI=${DEX_URL}/callback
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-t 1", "--spider", "http://localhost:${DEX_PORT}${APP_AUTH_PATH}/healthz"]
      interval: 2s
      timeout: 2s
      retries: 3
      start_period: 1s

  telemetry:
    scale: 0
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OpenTelemetry gRPC collector
      - "4318:4318"   # OpenTelemetry HTTP collector
      - "4100:4100"   # Loki ingest
      - "9090:9090"   # Prometheus UI
    environment:
      ENABLE_LOGS_ALL: "false"
    healthcheck:
      test: /opt/health-check.sh
      interval: 1m
      timeout: 10s
      retries: 10
      start_period: 1m
      start_interval: 10s